<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIe ResuMaker — Voice Build</title>
    <link rel="stylesheet" href="/static/voice_chat.css?v=6">
</head>
<body>
    <div class="voice-chat-container">
        <!-- Header -->
        <header class="chat-header">
            <a href="/" class="back-btn">←</a>
            <div class="chat-title">
                <span class="logo">🎓</span>
                <span>AIe ResuMaker</span>
            </div>
            <button class="mode-toggle" id="mode-toggle" title="Switch to form mode">✏️ Type</button>
        </header>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            <span class="progress-text" id="progress-text">0%</span>
        </div>

        <!-- Context Label -->
        <div class="context-label hidden" id="context-label"></div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-message" id="welcome-message">
                <div class="message-bubble">Hey! I'm AIe ResuMaker. Let's build your resume together. First — what's your full name?</div>
                <div class="message-time">Now</div>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-buttons hidden" id="nav-buttons">
            <button class="nav-btn back-btn-action" id="back-btn" title="Go back and fix previous answer">← Back</button>
            <button class="nav-btn add-btn" id="add-btn" title="Add another entry">+ Add Another</button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <button class="mic-btn" id="mic-btn" title="Tap to speak">
                <span class="mic-icon">🎤</span>
            </button>
            <div class="input-wrapper">
                <div class="helper-text hidden" id="helper-text"></div>
                <input 
                    type="text" 
                    id="text-input" 
                    class="text-input" 
                    placeholder="Type your answer..."
                    autocomplete="off"
                >
            </div>
            <button class="clear-btn" id="clear-btn" title="Clear text">✕</button>
            <button class="send-btn" id="send-btn">➤</button>
        </div>

        <!-- Recording Status -->
        <div class="recording-status hidden" id="recording-status">
            <span class="recording-dot"></span>
            <span>Listening...</span>
        </div>
    </div>

    <script src="/static/voice_chat.js?v=6"></script>
</body>
</html>
