<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIe ResuMaker — Voice Build</title>
    <link rel="stylesheet" href="/static/voice_chat.css?v=36">
</head>
<body>
    <div class="voice-chat-container">
        <!-- Debug Banner -->
        <div id="debug-banner" style="background:#cc0000;color:#fff;font-size:12px;padding:6px 10px;font-family:monospace;white-space:pre-wrap;word-break:break-word;z-index:9999;position:sticky;top:0;display:none;"></div>
        <!-- Header -->
        <header class="chat-header">
            <a href="/" class="back-btn">←</a>
            <div class="chat-title">
                <img src="/static/images/aei-logo.jpg" alt="AIe" class="logo-img" style="height: 28px; width: 28px; border-radius: 6px; object-fit: cover;">
                <span>AIe ResuMaker</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-label">
            <span class="progress-text" id="progress-text">0%</span>
        </div>

        <!-- Context Label -->
        <div class="context-label hidden" id="context-label"></div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-buttons hidden" id="nav-buttons">
            <button class="nav-btn back-btn-action" id="back-btn" title="Go back and fix previous answer">← Back</button>
            <button class="nav-btn add-btn" id="add-btn" title="Add another entry">+ Add Another</button>
            <button class="nav-btn done-jobs-btn" id="done-jobs-btn" title="Done adding jobs">✅ Done with Jobs</button>
            <button class="nav-btn skip-btn" id="skip-section-btn" title="Skip this section">⏭️ Skip Section</button>
            <button class="nav-btn save-btn" id="save-btn" title="Save progress">Save</button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <div class="helper-text hidden" id="helper-text"></div>
                <input 
                    type="text" 
                    id="text-input" 
                    class="text-input" 
                    placeholder="Type your answer..."
                    autocomplete="off"
                >
            </div>
            <button class="clear-btn" id="clear-btn" title="Clear text">✕</button>
            <button class="send-btn" id="send-btn">➤</button>
        </div>

    </div>

    <script src="/static/voice_chat.js?v=36"></script>
</body>
</html>
