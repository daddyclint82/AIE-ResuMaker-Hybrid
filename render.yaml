# Render Blueprint for AIe ResuMaker Hybrid
# Docs: https://render.com/docs/blueprint-spec
#
# Secrets (STRIPE_*, GROQ_API_KEY) are NOT defined here — set them in the
# Render dashboard (Environment tab). Never commit secret values.

services:
  - type: web
    name: aie-resumaker-hybrid
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install chromium || true"
    startCommand: "playwright install chromium 2>/dev/null; uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/healthz"
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      # The following are set manually in the dashboard (sync:false = not in git):
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_STUDENT_PRICE_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
